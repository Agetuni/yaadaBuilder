<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Yaada Builder — AI App Generator</title>
    <meta
      name="description"
      content="Yaada Builder by Yaada Labs. Build web apps through natural language — AI agents, websites & Telegram bots for Ethiopia."
    />
    <meta
      name="keywords"
      content="Yaada, Yaada Builder, Yaada Labs, AI, app generator, Ethiopia, Telegram bots, web development"
    />
    <meta name="author" content="Yaada Labs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://builder.u14.app" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon-light.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="icon" type="image/png" href="/favicon-light.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Yaada Builder — AI App Generator" />
    <meta
      property="og:description"
      content="AI Agents, Websites & Telegram Bots for Ethiopia. Build with Yaada Builder by Yaada Labs."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="Yaada Labs" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yaada Builder — AI App Generator" />
    <meta
      name="twitter:description"
      content="AI Agents, Websites & Telegram Bots for Ethiopia. Build with Yaada Builder by Yaada Labs."
    />
    <meta name="twitter:image" content="/og.png" />

    <!-- Fonts: Space Grotesk (display), Inter (body), Noto Sans Ethiopic (Amharic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Theme — light by default (Yaada Labs) -->
    <meta name="theme-color" content="#4568E8" />
    <meta name="color-scheme" content="light" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("yaada-builder-settings");
          var theme = "light";
          if (raw) {
            var parsed = JSON.parse(raw);
            var t = parsed?.state?.system?.theme;
            if (t === "dark" || t === "light") theme = t;
          }
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
